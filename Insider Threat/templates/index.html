<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Insider Threat Detection</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.7)),
                        url('https://images.unsplash.com/photo-1510511459019-5dda7724fd87');
            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .container {
            text-align: center;
            max-width: 800px;
            padding: 40px;
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h1 {
            font-size: 40px;
            margin-bottom: 15px;
            color: #4DA3FF;
        }

        p {
            font-size: 16px;
            color: #ddd;
            margin-bottom: 30px;
        }

        .buttons {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .btn {
            padding: 14px 30px;
            font-size: 16px;
            border-radius: 10px;
            text-decoration: none;
            transition: 0.3s;
            font-weight: 500;
        }

        .btn-register {
            background: #f5c542;
            color: black;
        }

        .btn-login {
            background: #1f2937;
            color: white;
        }

        .btn:hover {
            transform: scale(1.1);
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        /* Animation */
        .container {
            animation: fadeIn 1.2s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

    </style>
</head>

<body>

<div class="container">
    <h1>Insider Threat Detection</h1>
    <p>
        Monitor user activities, detect suspicious behavior, and prevent insider threats
        using login records, file access, and downloads.
    </p>

    <div class="buttons">
        <a href="/register" class="btn btn-register">Register</a>
        <a href="/login" class="btn btn-login">Login</a>
    </div>
</div>

</body>
</html>
